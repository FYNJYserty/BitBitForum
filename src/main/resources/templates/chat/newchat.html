<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Chat</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/newchat.css}">
</head>
    <body>
        <a th:href="@{/general}"><img th:src="@{/pictures/BitBitLogo.png}" class="logo"></a>
        <a th:href="@{/general}"><h1 class="bitbit">BitBit</h1></a>

        <div th:if="${errorMessage}" class="notification notification-error" id="errorNotification">
            <span class="notification-message" th:text="${errorMessage}"></span>
            <button class="notification-close" onclick="closeNotification('errorNotification')">&times;</button>
        </div>

        <div class="chat-container">
            <h2 class="chat-title">Create a new chat</h2>
            
            <form class="chat-form" method="post" th:action="@{/chats/createnew}" th:object="${chat}">
                <div class="form-group">
                    <label for="chat-name" class="form-label">Chat name:</label>
                    <input type="text" id="chat-name" class="form-input" th:field="*{nameChat}" placeholder="Enter chat name..." required>
                </div>
                
                <div class="form-group">
                    <label for="chat-password" class="form-label">Password (optional):</label>
                    <input type="password" id="chat-password" class="form-input" th:field="*{passwordChat}" placeholder="Enter password (leave empty for public chat)">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="chat-submit-btn">Create Chat</button>
                    <a th:href="@{/chats}" class="chat-cancel-btn">Cancel</a>
                </div>
            </form>
        </div>

        <script type="text/javascript" th:src="@{/javascript/notification.js}"></script>
    </body>
</html>
