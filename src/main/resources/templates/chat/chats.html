<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" type="text/css" th:href="@{/css/generalstyle.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/notifications.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/buttonpanel.css}">

    <title>Chats</title>
</head>
    <body>
        <a th:href="@{/general}"><img th:src="@{/pictures/BitBitLogo.png}" class="logo"></a>
        <a th:href="@{/general}"><h1 class="bitbit">BitBit</h1></a>

        <ul class="menu-bar">
            <li><a th:href="@{/discussions}">Discussions</a></li>
            <li><a th:href="@{/chats}">Chats</a></li>
            <li><a th:href="@{/minigames}">Mini games</a></li>
            <li><a th:href="@{/account}">Account</a></li>
            <li><a th:href="@{/settings}">Settings</a></li>
        </ul>

        <div class="main main-general">
            <!--Button panel-->
            <div class="button-panel">
                <a class="round-button" th:href="@{/chats}">
                    <span class="button-icon">My chats</span>
                </a>
                <a class="round-button" th:href="@{/chats/enterchat}">
                    <span class="button-icon">Enter chat</span>
                </a>
                <a class="round-button" th:href="@{/chats/createnew}">
                    <span class="button-icon">New chat</span>
                </a>
            </div>

            <!--Chat cards-->
            <div class="discussions-container" th:if="${chats != null and !chats.isEmpty()}">
                <div class="discussion-card" th:each="chat : ${chats}">
                    <div class="discussion-header">
                        <h3 class="discussion-theme" th:text="${chat.name}"></h3>
                    </div>
                    <div class="discussion-info">
                        <div class="info-item" th:each="member : ${chat.members}">
                            <span class="info-icon">👤</span>
                            <span class="info-value" th:text="${member}"></span>
                        </div>
                    </div>
                    <div class="discussion-actions">
                        <form th:if="${chat.ownersId.contains(currentUserId)}"
                              th:action="@{/chats/delete/{id}(id=${chat.id})}"
                              th:method="delete"
                              onsubmit="return confirm('Are you sure you want to delete this discussion?')">
                            <button type="submit" class="discussion-delete-btn">
                                <span>Delete</span>
                                <span class="arrow">×</span>
                            </button>
                        </form>
                        <a class="discussion-open-btn" th:href="@{/chats/{id}(id=${chat.id})}">
                            <span>Open Chat</span>
                            <span class="arrow">→</span>
                        </a>
                    </div>
                </div>
            </div>
            <!--No item warning-->
            <div class="no-item-block" th:if="${chats == null or chats.isEmpty()}">
                <h1>There is no chats</h1>
            </div>
        </div>

    </body>
</html>
