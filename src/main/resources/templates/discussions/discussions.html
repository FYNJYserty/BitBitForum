<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" type="text/css" th:href="@{/css/generalstyle.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/notifications.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/buttonpanel.css}">

    <title>Discussions</title>
</head>
    <body>
        <div th:if="${loginSuccessMessage}" class="notification notification-success" id="loginSuccessNotification">
            <span class="notification-message" th:text="${loginSuccessMessage}"></span>
            <button class="notification-close" onclick="closeNotification('loginSuccessNotification')">&times;</button>
        </div>

        <div th:if="${errorMessage}" class="notification notification-error" id="errorNotification">
            <span class="notification-message" th:text="${errorMessage}"></span>
            <button class="notification-close" onclick="closeNotification('errorNotification')">&times;</button>
        </div>

        <a th:href="@{/general}"><img th:src="@{/pictures/BitBitLogo.png}" class="logo"></a>
        <a th:href="@{/general}"><h1 class="bitbit">BitBit</h1></a>

        <ul class="menu-bar">
            <li><a th:href="@{/discussions}">Discussions</a></li>
            <li><a th:href="@{/chats}">Chats</a></li>
            <li><a th:href="@{/minigames}">Mini games</a></li>
            <li><a th:href="@{/account}">Account</a></li>
            <li><a th:href="@{/settings}">Settings</a></li>
        </ul>

        <div class="main main-general">
            <div class="button-panel">
                <a class="round-button" title="Create new discussion" th:href="@{/discussions/createnew}">
                    <span class="button-icon">New discussion</span>
                </a>
                <a class="round-button" title="Create new discussion" th:href="@{/discussions/mydisc}">
                    <span class="button-icon">My discussions</span>
                </a>
                <a class="round-button" title="Create new discussion" th:href="@{/discussions}">
                    <span class="button-icon">All discussions</span>
                </a>
            </div>

            <div class="discussions-container" th:if="${discussions != null and !discussions.isEmpty()}">
                <div class="discussion-card" th:each="discussion : ${discussions}">
                    <div class="discussion-header">
                        <h3 class="discussion-theme" th:text="${discussion.theme}">Theme</h3>
                    </div>
                    <div class="discussion-info">
                        <div class="info-item">
                            <span class="info-icon">👤</span>
                            <span class="info-label">Author:</span>
                            <span class="info-value" th:text="${discussion.author}">Author</span>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">💬</span>
                            <span class="info-label">Answers:</span>
                            <span class="info-value" th:text="${discussion.answersCnt}">0</span>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">📅</span>
                            <span class="info-label">Date:</span>
                            <span class="info-value" th:text="${discussion.date}">Date</span>
                        </div>
                    </div>
                    <div class="discussion-actions">
                        <form th:if="${discussion.authorId == statusUser}"
                              th:action="@{/discussions/delete/{id}(id=${discussion.id})}"
                              th:method="delete"
                              onsubmit="return confirm('Are you sure you want to delete this discussion?')">
                            <button type="submit" class="discussion-delete-btn">
                                <span>Delete</span>
                                <span class="arrow">×</span>
                            </button>
                        </form>
                        <a class="discussion-open-btn" th:href="@{/discussions/{id}(id=${discussion.id})}">
                            <span>Open Discussion</span>
                            <span class="arrow">→</span>
                        </a>
                    </div>
                </div>
            </div>

            <div class="no-item-block" th:if="${discussions == null or discussions.isEmpty()}">
                <h1>There is no discussions</h1>
            </div>
        </div>

        <script type="text/javascript" th:src="@{/javascript/notification.js}"></script>
    </body>
</html>
