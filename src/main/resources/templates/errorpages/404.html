<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" th:href="@{/css/errorpages.css}">
        <title>404 - Page Not Found - BitBit Forum</title>
    </head>
    <body>
        <div class="error-container">

            <div class="error-box">
                <div class="error-code">404</div>
                <h2 class="error-title">Page Not Found</h2>
                <p class="error-message">
                    The page you are looking for does not exist or has been moved.
                    Please check the URL or return to the homepage.
                </p>
                <div class="error-buttons">
                    <a th:href="@{/general}" class="btn btn-primary">Go to Homepage</a>
                    <a th:href="@{/discussions}" class="btn btn-secondary">Browse Discussions</a>
                </div>
            </div>
        </div>
    </body>
</html>
