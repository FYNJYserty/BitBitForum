<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" th:href="@{/css/errorpages.css}">
    <title>Access Denied - BitBit Forum</title>
</head>
<body>
    <div class="error-container">
        <a th:href="@{/general}" class="logo-link">
            <img th:src="@{/pictures/BitBitLogo.png}" class="logo" alt="BitBit Logo">
        </a>
        <a th:href="@{/general}" class="bitbit-link">
            <h1 class="bitbit">BitBit</h1>
        </a>
        
        <div class="error-box">
            <div class="error-code">403</div>
            <h2 class="error-title">Доступ запрещен</h2>
            <p class="error-message">
                У вас нет прав для доступа к этой странице.
                Пожалуйста, войдите в систему с соответствующими правами доступа.
            </p>
            <div class="error-buttons">
                <a th:href="@{/login}" class="btn btn-primary">Войти в систему</a>
                <a th:href="@{/general}" class="btn btn-secondary">На главную</a>
            </div>
        </div>
    </div>
</body>
</html>
