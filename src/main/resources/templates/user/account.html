<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Settings</title>
    
    <link rel="stylesheet" type="text/css" th:href="@{/css/account.css}">
</head>
    <body>
        <a th:href="@{/general}"><img th:src="@{/pictures/BitBitLogo.png}" class="logo"></a>
        <a th:href="@{/general}"><h1 class="bitbit">BitBit</h1></a>

        <!-- Success and Error Messages -->
        <div th:if="${success}" class="message success-message">
            <span th:text="${success}"></span>
        </div>
        
        <div th:if="${error}" class="message error-message">
            <span th:text="${error}"></span>
        </div>

        <div class="account-container">
            <h2 class="account-title">Account Settings</h2>
            
            <form class="account-form" th:method="patch" th:action="@{/account/update}" th:object="${userUpdateDto}">
                <div class="form-section">
                    <h3 class="section-title">Profile Avatar</h3>

                    <img class="account-avatar" th:if="${user.avatar == null}" th:src="@{/pictures/personlogo.png}">
                </div>
                <div class="form-section">
                    <h3 class="section-title">Profile Information</h3>
                    
                    <div class="form-group">
                        <label for="username" class="form-label">Username:</label>
                        <input type="text" id="username" name="username" class="form-input" 
                               placeholder="Enter new username" th:field="*{username}">
                        <small class="form-hint" th:text="'Current: ' + ${user.username}"></small>
                    </div>
                    
                    <div class="form-group">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" id="email" name="email" class="form-input" 
                               placeholder="Enter new email" th:field="*{email}">
                        <small class="form-hint" th:text="'Current: ' + ${user.email}"></small>
                    </div>
                    
                    <div class="form-group">
                        <label for="ageUsr" class="form-label">Age:</label>
                        <input type="number" id="ageUsr" name="ageUsr" class="form-input" 
                               placeholder="Age of user" th:field="*{ageUsr}">
                        <small class="form-hint" th:text="'Current: ' + ${user.ageUsr}"></small>
                    </div>
                </div>

                <div class="form-section">
                    <h3 class="section-title">Change Password</h3>
                    
                    <div class="form-group">
                        <label for="current-password" class="form-label">Current Password:</label>
                        <input type="password" id="current-password" name="currentPassword" 
                               class="form-input" placeholder="Enter current password" th:field="*{currentPassword}">
                    </div>
                    
                    <div class="form-group">
                        <label for="new-password" class="form-label">New Password:</label>
                        <input type="password" id="new-password" name="newPassword" 
                               class="form-input" placeholder="Enter new password" th:field="*{newPassword}">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password" class="form-label">Confirm New Password:</label>
                        <input type="password" id="confirm-password" name="confirmPassword" 
                               class="form-input" placeholder="Confirm new password" th:field="*{confirmPassword}">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="save-btn">Save Changes</button>
                    <a type="button" class="cancel-btn" th:href="@{/general}">Cancel</a>
                </div>
            </form>
        </div>

    </body>
</html>
